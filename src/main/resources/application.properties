# Server Configuration
server.port=8080
spring.application.name=role-based-app

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=rolebasedapp

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationPleaseChangeThisInProduction1234567890
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.rolebasedapp=DEBUG

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000